    <!--
      FAST URL REDIRECT SCRIPT
      Runs BEFORE React loads. Detects short URL patterns, queries the DB directly,
      tracks the click via keepalive fetch, and redirects instantly.
      No spinner, no loading screen — just an immediate redirect.
    -->
    <script>
      (function(){
        var SUPABASE_URL = "%VITE_SUPABASE_URL%".replace(/\/+(rest\/v1|auth\/v1|functions\/v1)\/?$/i, "").replace(/\/+$/, "");
        var SUPABASE_KEY = "%VITE_SUPABASE_PUBLISHABLE_KEY%";

        // Bail if env vars aren't replaced (dev mode fallback — React handles it)
        if (!SUPABASE_URL || SUPABASE_URL.indexOf("VITE_") !== -1) return;

        var path = location.pathname;
        if (path === "/" || path === "") return;

        var KNOWN = ["auth","dashboard","lead-push","crm","settings","url-shortener","telecaller","universities","upload","history","logs","marketing","not-found"];
        var parts = path.split("/").filter(Boolean);
        if (parts.length === 0 || parts.length > 3) return;

        // Skip known app routes
        var first = parts[0].toLowerCase();
        for (var i = 0; i < KNOWN.length; i++) {
          if (first === KNOWN[i]) return;
        }

        var header = null, code = null;

        // Handle /r/ and /s/ prefixes (legacy)
        if (first === "r" || first === "s") {
          if (parts.length === 2) { code = parts[1]; }
          else if (parts.length === 3) { header = parts[1]; code = parts[2]; }
          else return;
        } else if (parts.length === 1) {
          code = parts[0];
        } else if (parts.length === 2) {
          header = parts[0];
          code = parts[1];
        } else return;

        if (!code || !/^[a-zA-Z0-9]+$/.test(code)) return;
        if (header && !/^[a-zA-Z0-9]+$/.test(header)) return;

        // Build Supabase REST query
        var apiUrl = SUPABASE_URL + "/rest/v1/url_mappings?select=id,original_url,is_active,expires_at,user_tracking&short_code=eq." + encodeURIComponent(code);
        if (header) {
          apiUrl += "&header=eq." + encodeURIComponent(header.toUpperCase());
        } else {
          apiUrl += "&header=is.null";
        }

        // Prevent any flash — hide everything until we know if this is a redirect
        var style = document.createElement("style");
        style.id = "fast-redirect-hide";
        style.textContent = "html{display:none!important}";
        document.documentElement.appendChild(style);

        var xhr = new XMLHttpRequest();
        xhr.open("GET", apiUrl, true);
        xhr.setRequestHeader("apikey", SUPABASE_KEY);
        xhr.setRequestHeader("Accept", "application/json");
        xhr.timeout = 3000; // 3s max — fallback to React if slow

        xhr.onload = function() {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              var m = data[0];

              // If no exact match and no header was specified, try broader (without header=is.null)
              if (!m && !header) {
                var broadUrl = SUPABASE_URL + "/rest/v1/url_mappings?select=id,original_url,is_active,expires_at,user_tracking&short_code=eq." + encodeURIComponent(code) + "&limit=1";
                var xhr2 = new XMLHttpRequest();
                xhr2.open("GET", broadUrl, true);
                xhr2.setRequestHeader("apikey", SUPABASE_KEY);
                xhr2.setRequestHeader("Accept", "application/json");
                xhr2.timeout = 2000;
                xhr2.onload = function() {
                  if (xhr2.status === 200) {
                    try {
                      var d2 = JSON.parse(xhr2.responseText);
                      if (d2[0]) { doRedirect(d2[0]); return; }
                    } catch(e) {}
                  }
                  showPage();
                };
                xhr2.onerror = xhr2.ontimeout = function() { showPage(); };
                xhr2.send();
                return;
              }

              if (m) { doRedirect(m); return; }
            } catch(e) {}
          }
          showPage();
        };

        xhr.onerror = xhr.ontimeout = function() { showPage(); };
        xhr.send();

        function doRedirect(m) {
          if (!m.is_active) { showPage(); return; }
          if (m.expires_at && new Date(m.expires_at) < new Date()) { showPage(); return; }

          // Track click with keepalive (survives page navigation)
          if (m.user_tracking !== false) {
            trackClick(m.id);
          }

          // INSTANT redirect — no waiting
          location.replace(m.original_url);
        }

        function trackClick(urlId) {
          var ua = navigator.userAgent;
          var browser = null, os = null, deviceType = "desktop";

          if (ua.indexOf("Chrome") > -1 && ua.indexOf("Edg") === -1) browser = "Chrome";
          else if (ua.indexOf("Safari") > -1 && ua.indexOf("Chrome") === -1) browser = "Safari";
          else if (ua.indexOf("Firefox") > -1) browser = "Firefox";
          else if (ua.indexOf("Edg") > -1) browser = "Edge";
          else if (ua.indexOf("Opera") > -1 || ua.indexOf("OPR") > -1) browser = "Opera";

          if (ua.indexOf("Windows") > -1) os = "Windows";
          else if (ua.indexOf("Mac OS") > -1) os = "macOS";
          else if (ua.indexOf("Linux") > -1) os = "Linux";
          else if (ua.indexOf("Android") > -1) os = "Android";
          else if (ua.indexOf("iPhone") > -1 || ua.indexOf("iPad") > -1) os = "iOS";

          if (ua.indexOf("Mobile") > -1 || ua.indexOf("Android") > -1 || ua.indexOf("iPhone") > -1) deviceType = "mobile";
          else if (ua.indexOf("iPad") > -1 || ua.indexOf("Tablet") > -1) deviceType = "tablet";

          var headers = { "apikey": SUPABASE_KEY, "Content-Type": "application/json", "Prefer": "return=minimal" };

          // Insert click record (keepalive survives navigation)
          try {
            fetch(SUPABASE_URL + "/rest/v1/url_clicks", {
              method: "POST",
              headers: headers,
              body: JSON.stringify({
                url_id: urlId,
                user_agent: ua,
                referrer: document.referrer || null,
                browser: browser,
                os: os,
                device_type: deviceType
              }),
              keepalive: true
            });
          } catch(e) {}

          // Increment click counter (keepalive)
          try {
            fetch(SUPABASE_URL + "/rest/v1/rpc/increment_url_clicks", {
              method: "POST",
              headers: headers,
              body: JSON.stringify({ p_url_id: urlId }),
              keepalive: true
            });
          } catch(e) {}
        }

        function showPage() {
          var s = document.getElementById("fast-redirect-hide");
          if (s) s.parentNode.removeChild(s);
        }
      })();
    </script>
